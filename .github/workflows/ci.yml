name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: deep_claw
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d deep_claw"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      mongo:
        image: mongo:7
        ports:
          - 27017:27017

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/deep_claw
      MONGODB_URI: mongodb://localhost:27017
      MONGODB_DB_NAME: deep_claw
      OPENAI_API_KEY: ci-test-placeholder
      OPENAI_BASE_URL: http://127.0.0.1:9/v1
      OPENAI_MODEL: glm-4-plus
      CORS_ORIGINS: "*"

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.7.x"
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Sync and test
        working-directory: backend
        run: |
          uv sync --group dev --frozen
          uv run pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Lint and build
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm run build
